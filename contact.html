<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COFFAÉ — Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>


    <nav class="contact-nav">
        <a href="index.html" class="contact-logo">COFFAÉ</a>
        <div class="contact-nav-links">
            <a href="product.html">Product</a>
            <a href="materials.html">Materials</a>
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="contact-nav-active">Contact</a>
        </div>
    </nav>

    <main class="contact-main">
        <div class="contact-body">

            <p class="contact-eyebrow">Contact</p>
            <h1 class="contact-title">Send us<br>a message.</h1>

            <form class="contact-form" onsubmit="handleSubmit(event)">

                <div class="contact-form-row">
                    <div class="contact-field">
                        <label class="contact-label">First name</label>
                        <input type="text" class="contact-input" placeholder="—">
                    </div>
                    <div class="contact-field">
                        <label class="contact-label">Last name</label>
                        <input type="text" class="contact-input" placeholder="—">
                    </div>
                </div>

                <div class="contact-field">
                    <label class="contact-label">Email</label>
                    <input type="email" class="contact-input" placeholder="—">
                </div>

                <div class="contact-field">
                    <label class="contact-label">Subject</label>
                    <select class="contact-select">
                        <option>General inquiry</option>
                        <option>Product question</option>
                        <option>Licensing interest</option>
                        <option>Press & media</option>
                    </select>
                </div>

                <div class="contact-field">
                    <label class="contact-label">Message</label>
                    <textarea class="contact-textarea" placeholder="—"></textarea>
                </div>

                <button type="submit" class="contact-btn">Send</button>

                <p class="contact-success" id="contactSuccess">
                    Message sent! We'll be in touch soon.
                </p>

            </form>

            <div class="contact-footer-info">
                <div>
                    <p class="contact-info-label">Email</p>
                    <p class="contact-info-val">hello@coffae.co</p>
                </div>
                <div>
                    <p class="contact-info-label">Follow</p>
                    <div class="contact-socials">
                        <a href="#">Instagram</a>
                        <a href="#">Pinterest</a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="contact-page-footer">
        <a href="index.html" class="contact-page-footer-logo">COFFAÉ</a>
    </footer>

    <!-- Thank you overlay -->
    <div class="thankyou-overlay" id="thankyouOverlay">
        <a href="index.html" class="thankyou-logo">COFFAÉ</a>
        <div class="thankyou-content">
            <p class="thankyou-eyebrow">Message received</p>
            <h1 class="thankyou-title">Thank You</h1>
            <p class="thankyou-sub">We'll be in touch soon.</p>
        </div>
    </div>

    <script src="js/contact.js"></script>
</body>
</html>
